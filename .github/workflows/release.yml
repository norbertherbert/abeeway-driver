name: Release Drivers

on:
  push:
    tags:
      - "at2-v*"
      - "at3-v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Package to release"
        required: true
        type: choice
        options:
          - at2
          - at3
      version:
        description: "Package version without the tag prefix, for example 3.8.7"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release target
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
            version="${{ inputs.version }}"
            tag="${target}-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            case "${tag}" in
              at2-v*)
                target="at2"
                version="${tag#at2-v}"
                ;;
              at3-v*)
                target="at3"
                version="${tag#at3-v}"
                ;;
              *)
                echo "Unsupported tag: ${tag}" >&2
                exit 1
                ;;
            esac
          fi

          case "${target}" in
            at2)
              package_dir="AT2"
              asset_prefix="abw-at2-drv"
              release_name="AT2 ${version}"
              ;;
            at3)
              package_dir="AT3"
              asset_prefix="abw-at3-drv"
              release_name="AT3 ${version}"
              ;;
            *)
              echo "Unsupported target: ${target}" >&2
              exit 1
              ;;
          esac

          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_dir=${package_dir}" >> "${GITHUB_OUTPUT}"
          echo "asset_prefix=${asset_prefix}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ steps.target.outputs.package_dir }}/package-lock.json

      - name: Verify package version
        shell: bash
        run: |
          package_version="$(node -p "require('./${{ steps.target.outputs.package_dir }}/package.json').version")"
          if [[ "${package_version}" != "${{ steps.target.outputs.version }}" ]]; then
            echo "Tag version (${{ steps.target.outputs.version }}) does not match package.json (${package_version})." >&2
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ steps.target.outputs.package_dir }}
        run: npm ci

      - name: Build package
        working-directory: ${{ steps.target.outputs.package_dir }}
        run: npm run build

      - name: Create release archive
        shell: bash
        run: |
          archive="${{ steps.target.outputs.asset_prefix }}-${{ steps.target.outputs.version }}.zip"
          zip -j "${archive}" "${{ steps.target.outputs.package_dir }}/dist/"*
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
        id: archive

      - name: Create checksums
        shell: bash
        run: |
          sha256sum "${{ steps.archive.outputs.archive }}" "${{ steps.target.outputs.package_dir }}/dist/"* > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: ${{ steps.target.outputs.release_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.target.outputs.package_dir }}/dist/*
            SHA256SUMS.txt
